<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudyIA</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<header>

<h1>🤖 StudyIA</h1>

<nav>

<button id="chatBtn">💬 Chat</button>

<button id="estudioBtn">📚 Estudio</button>

<button id="imagenesBtn">🖼️ Imágenes</button>

<button id="ajustesBtn">⚙️ Ajustes</button>

</nav>

</header>

<div class="container">

<div id="chat-box"></div>

<div class="acciones">

<button onclick="usarModo('Resume este texto.')">📄 Resumen</button>

<button onclick="usarModo('Crea un examen tipo test.')">❓ Test</button>

<button onclick="usarModo('Explícalo de forma sencilla.')">🧠 Explicar</button>

<button onclick="usarModo('Crea flashcards.')">📚 Flashcards</button>

</div>

<div class="entrada">

<input
id="userInput"
type="text"
placeholder="Escribe aquí..."
>

<button onclick="enviarMensaje()">

Enviar

</button>

</div>

</div>
<script>

function usarModo(texto){
    document.getElementById("userInput").value = texto;
}

async function enviarMensaje(){

    const mensaje = document.getElementById("userInput").value;

    if(!mensaje) return;

    const chat = document.getElementById("chat-box");

    chat.innerHTML += `<div class="message user">${mensaje}</div>`;

    document.getElementById("userInput").value="";

    const respuesta = await fetch("/preguntar",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            mensaje:mensaje
        })
    });

    const data = await respuesta.json();

    chat.innerHTML += `<div class="message bot">${data.respuesta}</div>`;

    chat.scrollTop = chat.scrollHeight;

}

</script>

</body>

</html>

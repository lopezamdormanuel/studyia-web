<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyIA - Tu Tutor Inteligente</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 600px; height: 80vh; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: #4A90E2; color: white; padding: 20px; text-align: center; font-size: 1.2rem; font-weight: bold; display: flex; flex-direction: column; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 8px; max-width: 80%; word-wrap: break-word; }
        .user { background: #E1F5FE; align-self: flex-end; color: #0277BD; }
        .bot { background: #F1F1F1; align-self: flex-start; color: #333; }
        .chat-input-area { display: flex; border-top: 1px solid #eee; padding: 10px; background: #fafafa; }
        .chat-input-area input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; outline: none; font-size: 1rem; }
        .chat-input-area button { background: #4A90E2; color: white; border: none; padding: 0 20px; margin-left: 10px; border-radius: 6px; cursor: pointer; font-size: 1rem; }
        .chat-input-area button:hover { background: #357ABD; }
    </style>
</head>
<body>
    <header>
    <div class="logo">🤖 StudyIA</div>

    <nav>
        <button>💬 Chat</button>
        <button>📚 Estudio</button>
        <button>🖼️ Imágenes</button>
        <button>⚙️ Ajustes</button>
    </nav>
</header>
    <div class="container"
    <div class="chat-container">
        <div class="chat-header">📚 StudyIA - by Manuel López Amador</div>
        
        <div class="chat-box" id="chatBox">
            <div class="message bot">¡Hola! Soy StudyIA. ¿En qué puedo ayudarte a estudiar hoy?</div>
        </div>

        <form class="chat-input-area" id="chatForm" enctype="multipart/form-data">
            <label for="imageInput" style="cursor: pointer; padding: 0 10px; font-size: 1.5rem; display: flex; align-items: center;">📎</label>
    <input type="file" id="imageInput" accept="image/*" style="display: none;">
            <input type="text" id="userInput" placeholder="Escribe tu pregunta o 'dibuja...'" required autocomplete="off">
            <button type="submit">Enviar</button>
        </form>
    </div>

    <div id="previewContainer" style="display: none; padding: 10px; background: #fafafa; border-top: 1px solid #eee; text-align: left;">
        <span style="font-size: 0.8rem; color: #666;">📸 Imagen seleccionada</span>
        <button type="button" id="clearImage" style="margin-left: 10px; background: none; border: none; color: red; cursor: pointer;">❌ Quitar</button>
    </div>

<script>
document.getElementById('chatForm').addEventListener('submit', async (e) => {
    e.preventDefault();
  


        const userInput = document.getElementById('userInput');
        const imageInput = document.getElementById('imageInput');
        const chatBox = document.getElementById('chatBox');
        
        const message = userInput.value.trim();
        if (!message && !imageInput.files[0]) return; 

        if (message) {
            const userDiv = document.createElement('div');
            userDiv.className = 'message user';
            userDiv.innerText = message;
            chatBox.appendChild(userDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        const formData = new FormData();
        formData.append('message', message);
        if (imageInput.files[0]) {
            formData.append('image', imageInput.files[0]);
        }

        const BACKEND_URL = 'https://studyia-web.onrender.com/preguntar'; 

       try {
            const response = await fetch(BACKEND_URL, {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            
            if (data.url_imagen) {
    const img = document.createElement("img");
    img.src = data.url_imagen;
    img.style.maxWidth = "300px";
    img.style.borderRadius = "10px";
    chatBox.appendChild(img);
    chatBox.scrollTop = chatBox.scrollHeight;
} else if (data.respuesta) {
    const botDiv = document.createElement("div");
    botDiv.className = "message bot";
    botDiv.innerText = data.respuesta;
    chatBox.appendChild(botDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
}
            
            userInput.value = '';
imageInput.value = '';
document.getElementById('previewContainer').style.display = 'none';
            
        } catch (error) {
            console.error('Error:', error);
        }
    });
    </script>
</div>  
</body>
</html>
